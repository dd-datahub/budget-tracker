    .main-content { padding: 12px 12px 0; max-width: 1100px; margin: 0 auto; padding-bottom: calc(76px + env(safe-area-inset-bottom,0px)); }

    /* ── Header ── */

    .kpi-card { background: #1e293b; border-radius: 12px; padding: 12px; border: 1px solid #334155; }
    @media (min-width: 700px) { .kpi-grid-3 { grid-template-columns: repeat(4,1fr); } }

    /* ── Tx Cards (mobile) ── */
    .tx-card-list { display: flex; flex-direction: column; gap: 8px; }

// ── Login Screen ───────────────────────────────────────────────────────────────
function LoginScreen({loginError}) {
  const [loading, setLoading] = React.useState(false);
  async function signIn() {
    setLoading(true);
    const provider = new firebase.auth.GoogleAuthProvider();
    try {
      // ใช้ redirect แทน popup — เข้ากันได้กับ GitHub Pages และมือถือ
      await auth.signInWithRedirect(provider);
      // หน้าจะ redirect ออกไป ไม่มีโค้ดหลังบรรทัดนี้
    } catch(e) {
      console.error(e);
      setLoading(false);
    }

        <button
          onClick={signIn}
          disabled={loading}
          style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:12,padding:"14px 20px",background:loading?"#334155":"#fff",border:"none",borderRadius:12,cursor:loading?"not-allowed":"pointer",fontFamily:"inherit",fontWeight:700,fontSize:15,color:"#1a1a1a",transition:"all .2s"}}>
          {loading
            ? <><span style={{width:18,height:18,border:"2.5px solid #6366f1",borderTopColor:"transparent",borderRadius:"50%",display:"inline-block",animation:"spin 0.7s linear infinite"}}/>กำลังนำไปหน้า Google...</>
            : <><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" height="20"/>เข้าสู่ระบบด้วย Google</>
          }
        </button>
        {loginError && <div style={{marginTop:14,padding:"10px 14px",background:"#f43f5e22",border:"1px solid #f43f5e44",borderRadius:10,fontSize:13,color:"#fca5a5",textAlign:"center"}}>{loginError}</div>}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [user,         setUser]         = useState(undefined); // undefined=loading, null=not logged in
  const [loginError,   setLoginError]   = useState("");
  const [profile,      setProfile]      = useState("personal");
  const [transactions, setTransactions] = useState([]);
  const [categories,   setCategories]   = useState(INIT_CATS);
  const [activeTab,    setActiveTab]    = useState("dashboard");
  const [viewYear,     setViewYear]     = useState(new Date().getFullYear());
  const [viewMonth,    setViewMonth]    = useState(new Date().getMonth());
  const [loading,      setLoading]      = useState(true);
  const [saveStatus,   setSaveStatus]   = useState("idle");
  const initialized = useRef(false);
  const saveTimer   = useRef(null);

  // ── ติดตามสถานะ Login + รับผล Redirect ──────────────────────────────────────
  useEffect(() => {
    // รับผลจาก signInWithRedirect เมื่อกลับมาจาก Google
    auth.getRedirectResult().catch(e => {
      console.error("Redirect error:", e);
      setLoginError("เข้าสู่ระบบไม่สำเร็จ กรุณาลองใหม่");
    });

    const unsub = auth.onAuthStateChanged(u => {
      setUser(u || null);
      if (!u) { setLoading(false); }
    });
    return () => unsub();
  }, []);

  const prof = PROFILES[profile];
  const dbPath = user ? `budget/${user.uid}/${profile}` : null;

  // ── สลับโปรไฟล์ ───────────────────────────────────────────────────────────
  function switchProfile(p) {
    if (p === profile) return;
    initialized.current = false;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    setLoading(true);
    setTransactions([]);
    setCategories(INIT_CATS);
    setSaveStatus("idle");
    setProfile(p);
  }

  // ── โหลดข้อมูลจาก Realtime Database เมื่อ login หรือสลับโปรไฟล์ ──────────
  useEffect(() => {
    if (!user) return;
    const path = `budget/${user.uid}/${profile}`;
    const ref = db.ref(path);
    ref.once("value").then(snapshot => {
      const data = snapshot.val();
      if (data) {
        if (data.transactions?.length) setTransactions(data.transactions);
        if (data.categories?.length)   setCategories(data.categories);
      }
      initialized.current = true;
      setLoading(false);
    }).catch(err => {
      console.error("โหลดข้อมูลล้มเหลว:", err);
      initialized.current = true;
      setLoading(false);
    });
  }, [profile, user]);

  // ── บันทึกข้อมูลอัตโนมัติ ────────────────────────────────────────────────
  useEffect(() => {
    if (!initialized.current || !user) return;
    setSaveStatus("saving");
    if (saveTimer.current) clearTimeout(saveTimer.current);
    const path = `budget/${user.uid}/${profile}`;
    const ref = db.ref(path);
    saveTimer.current = setTimeout(() => {
      ref.set({ transactions, categories })
        .then(() => {
          setSaveStatus("saved");
          setTimeout(() => setSaveStatus("idle"), 2000);
        })
        .catch(err => {
          console.error("บันทึกล้มเหลว:", err);
          setSaveStatus("error");
        });
    }, 500);
  }, [transactions, categories]);

  // tx modal
  const [showModal,     setShowModal]     = useState(false);
  const [editItem,      setEditItem]      = useState(null);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [form, setForm] = useState({date:today(),type:"income",category:"เงินเดือน",desc:"",amount:""});

  // cat modal
  const [showCatModal,      setShowCatModal]      = useState(false);
  const [editCat,           setEditCat]           = useState(null);
  const [deleteCatConfirm,  setDeleteCatConfirm]  = useState(null);
  const [catForm, setCatForm] = useState({type:"income",name:"",color:COLOR_PALETTE[0]});
  const [catFilter, setCatFilter] = useState("all");

  // filters
  const [filterType, setFilterType] = useState("all");
  const [filterCat,  setFilterCat]  = useState("all");
  const [searchText, setSearchText] = useState("");

  const incomeCats  = useMemo(()=>categories.filter(c=>c.type==="income"),  [categories]);
  const expenseCats = useMemo(()=>categories.filter(c=>c.type==="expense"), [categories]);
  const investCats  = useMemo(()=>categories.filter(c=>c.type==="invest"),  [categories]);
  const colorMap    = useMemo(()=>Object.fromEntries(categories.map(c=>[c.name,c.color])), [categories]);

  const years = useMemo(()=>{
    const s=new Set(transactions.map(t=>+t.date.slice(0,4)));
    return [...s].sort();
  },[transactions]);

  const yearSummary = useMemo(()=>years.map(y=>{
    const rows=transactions.filter(t=>+t.date.slice(0,4)===y);
    const income=rows.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
    const expense=rows.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
    return {year:y,income,expense,balance:income-expense};
  }),[transactions,years]);

  const monthSummary = useMemo(()=>MONTHS.map((m,idx)=>{
    const rows=transactions.filter(t=>+t.date.slice(0,4)===viewYear&&+t.date.slice(5,7)-1===idx);
    const income =rows.filter(t=>t.type==="income" ).reduce((s,t)=>s+t.amount,0);
    const expense=rows.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
    const invest =rows.filter(t=>t.type==="invest" ).reduce((s,t)=>s+t.amount,0);
    return {month:m,monthFull:MONTHS_FULL[idx],idx,income,expense,invest,balance:income-expense-invest};
  }),[transactions,viewYear]);

  const monthTx = useMemo(()=>
    transactions.filter(t=>+t.date.slice(0,4)===viewYear&&+t.date.slice(5,7)-1===viewMonth)
      .sort((a,b)=>b.date.localeCompare(a.date)),
  [transactions,viewYear,viewMonth]);

  const dashStats = useMemo(()=>{
    const yr=transactions.filter(t=>+t.date.slice(0,4)===viewYear);
    const totalIncome =yr.filter(t=>t.type==="income" ).reduce((s,t)=>s+t.amount,0);
    const totalExpense=yr.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
    const totalInvest =yr.filter(t=>t.type==="invest" ).reduce((s,t)=>s+t.amount,0);
    const expTotals={}, invTotals={};
    yr.filter(t=>t.type==="expense").forEach(t=>{expTotals[t.category]=(expTotals[t.category]||0)+t.amount;});
    yr.filter(t=>t.type==="invest" ).forEach(t=>{invTotals[t.category]=(invTotals[t.category]||0)+t.amount;});
    return {totalIncome,totalExpense,totalInvest,
      balance:totalIncome-totalExpense-totalInvest,
      expPieData:Object.entries(expTotals).map(([k,v])=>({name:k,value:v})),
      invPieData:Object.entries(invTotals).map(([k,v])=>({name:k,value:v}))};
  },[transactions,viewYear]);

  const filteredTx = useMemo(()=>
    transactions.filter(t=>{
      if(filterType!=="all"&&t.type!==filterType) return false;
      if(filterCat!=="all"&&t.category!==filterCat) return false;
      if(searchText&&!t.desc.toLowerCase().includes(searchText.toLowerCase())&&!t.category.includes(searchText)) return false;
      return true;
    }).sort((a,b)=>b.date.localeCompare(a.date)),
  [transactions,filterType,filterCat,searchText]);

  const filteredCats = useMemo(()=>catFilter==="all"?categories:categories.filter(c=>c.type===catFilter),[categories,catFilter]);

  // ── TX handlers ──
  function openAdd() {
    setEditItem(null);
    setForm({date:today(),type:"income",category:incomeCats[0]?.name||"",desc:"",amount:""});
    setShowModal(true);
  }
  function openEdit(item) {
    setEditItem(item);
    setForm({date:item.date,type:item.type,category:item.category,desc:item.desc,amount:String(item.amount)});
    setShowModal(true);
  }
  function saveForm() {
    if(!form.date||!form.amount||isNaN(+form.amount)||+form.amount<=0) return;
    if(editItem) {
      setTransactions(prev=>prev.map(t=>t.id===editItem.id?{...t,...form,amount:+form.amount}:t));
    } else {
      const newId=Math.max(0,...transactions.map(t=>t.id))+1;
      setTransactions(prev=>[...prev,{id:newId,...form,amount:+form.amount}]);
      const y=+form.date.slice(0,4);
      if(y!==viewYear) setViewYear(y);
    }
    setShowModal(false);
  }
  function deleteItem(id) { setTransactions(prev=>prev.filter(t=>t.id!==id)); setDeleteConfirm(null); }
  function handleTypeChange(v) {
    const first = v==="income"?incomeCats[0]?.name : v==="expense"?expenseCats[0]?.name : investCats[0]?.name;
    setForm(f=>({...f,type:v,category:first||""}));
  }

  // ── CAT handlers ──
  function openAddCat() { setEditCat(null); setCatForm({type:"income",name:"",color:COLOR_PALETTE[0]}); setShowCatModal(true); }
  function openEditCat(cat) { setEditCat(cat); setCatForm({type:cat.type,name:cat.name,color:cat.color}); setShowCatModal(true); }
  function saveCat() {
    if(!catForm.name.trim()) return;
    if(editCat) {
      const oldName=editCat.name, newName=catForm.name.trim();
      setCategories(prev=>prev.map(c=>c.id===editCat.id?{...c,name:newName,color:catForm.color,type:catForm.type}:c));
      if(oldName!==newName) setTransactions(prev=>prev.map(t=>t.category===oldName?{...t,category:newName}:t));
    } else {
      if(categories.some(c=>c.name===catForm.name.trim())) return;
      setCategories(prev=>[...prev,{id:uid(),type:catForm.type,name:catForm.name.trim(),color:catForm.color}]);
    }
    setShowCatModal(false);
  }
  function deleteCat() {
    if(!deleteCatConfirm) return;
    setCategories(prev=>prev.filter(c=>c.id!==deleteCatConfirm.cat.id));
    setDeleteCatConfirm(null);
  }

  const formCats = form.type==="income"?incomeCats : form.type==="expense"?expenseCats : investCats;
  const tabs = [
    {k:"dashboard",  icon:"📊", label:"หน้าหลัก"},
    {k:"transactions",icon:"📋",label:"รายการ"},
    {k:"monthly",    icon:"📅", label:"รายเดือน"},
    {k:"yearly",     icon:"📆", label:"รายปี"},
    {k:"categories", icon:"🏷️", label:"หมวด"},
  ];

  // ── Auth Loading ────────────────────────────────────────────────────────────
  if (user === undefined) return (
    <div style={{background:"#0f172a",minHeight:"100dvh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14}}>
      <div style={{fontSize:44}}>💰</div>
      <div style={{width:38,height:38,border:"4px solid #334155",borderTop:"4px solid #6366f1",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
    </div>
  );

  // ── Login Screen ────────────────────────────────────────────────────────────
  if (!user) return <LoginScreen loginError={loginError} />;

  // ── Loading screen ─────────────────────────────────────────────────────────
  if (loading) return (
    <div style={{background:"#0f172a",minHeight:"100dvh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14}}>
      <div style={{fontSize:44}}>💰</div>
      <div style={{fontSize:15,fontWeight:700,color:"#f1f5f9"}}>{prof.icon} {prof.label}</div>
      <div style={{color:prof.color,fontSize:14,fontWeight:600}}>กำลังโหลดข้อมูล...</div>
      <div style={{width:38,height:38,border:`4px solid #334155`,borderTop:`4px solid ${prof.color}`,borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
    </div>
  );

  return (
    <div style={{fontFamily:"'Sarabun','Segoe UI',sans-serif",background:"#0f172a",minHeight:"100dvh",color:"#e2e8f0"}}>

      {/* Firebase Error Banner */}
      {saveStatus==="error" && (
        <div style={{background:"#7f1d1d",borderBottom:"2px solid #f43f5e",padding:"10px 14px",display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:16}}>❌</span>
          <div>
            <div style={{fontWeight:700,fontSize:12,color:"#fca5a5"}}>บันทึกไม่สำเร็จ — ตรวจสอบ Firebase Rules</div>
            <div style={{fontSize:10,color:"#fca5a5",opacity:.8}}>Realtime Database → Rules → ตั้งค่าตาม auth.uid → Publish</div>
          </div>
        </div>
      )}

      {/* Header */}
      <div className="app-header" style={{background:prof.grad}}>
        {/* Profile Switcher */}
        <div style={{display:"flex",background:"rgba(0,0,0,.25)",borderRadius:12,padding:3,gap:2}}>
          {Object.entries(PROFILES).map(([k,p])=>(
            <button key={k} onClick={()=>switchProfile(k)} style={{
              display:"flex",alignItems:"center",gap:5,padding:"7px 11px",borderRadius:9,border:"none",cursor:"pointer",
              background:profile===k?"rgba(255,255,255,.22)":"transparent",
              color:profile===k?"#fff":"rgba(255,255,255,.55)",fontWeight:700,fontSize:12,transition:"all .2s",
              boxShadow:profile===k?"0 2px 8px rgba(0,0,0,.25)":"none"
            }}>
              <span style={{fontSize:15}}>{p.icon}</span>
              <span>{p.label}</span>
            </button>
          ))}
        </div>

        <div style={{display:"flex",alignItems:"center",gap:5}}>
          {saveStatus==="saving" && <span style={{fontSize:10,color:"#fbbf24",background:"rgba(251,191,36,.15)",padding:"3px 7px",borderRadius:6,whiteSpace:"nowrap"}}>💾 บันทึก...</span>}
          {saveStatus==="saved"  && <span style={{fontSize:10,color:"#10b981",background:"rgba(16,185,129,.15)",padding:"3px 7px",borderRadius:6,whiteSpace:"nowrap"}}>✅ บันทึกแล้ว</span>}
          <button onClick={()=>setViewYear(y=>y-1)} style={S.navBtn}>◀</button>
          <span style={{fontSize:15,fontWeight:700,minWidth:44,textAlign:"center"}}>{viewYear}</span>
          <button onClick={()=>setViewYear(y=>y+1)} style={S.navBtn}>▶</button>
          {/* User Avatar + Sign Out */}
          <div style={{position:"relative",marginLeft:4}}>
            <button
              onClick={()=>auth.signOut()}
              title={`ออกจากระบบ (${user?.email})`}
              style={{width:34,height:34,borderRadius:"50%",overflow:"hidden",border:"2px solid rgba(255,255,255,.3)",cursor:"pointer",padding:0,background:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
              {user?.photoURL
                ? <img src={user.photoURL} width="34" height="34" style={{borderRadius:"50%"}} referrerPolicy="no-referrer"/>
                : <span style={{fontSize:16,color:"#fff",background:"rgba(255,255,255,.2)",width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:"50%"}}>👤</span>
              }
            </button>
          </div>
        </div>
      </div>

      {/* Top Tab Bar (desktop only) */}
      <div className="top-tab-bar" style={{display:"none",background:"#1e293b",padding:"6px 14px",gap:4,borderBottom:"1px solid #334155"}}>
        {tabs.map(({k,icon,label})=>(
          <button key={k} onClick={()=>setActiveTab(k)} style={{
            background:activeTab===k?prof.color:"transparent",
            border:"none",color:activeTab===k?"#fff":"#94a3b8",
            padding:"7px 14px",borderRadius:8,cursor:"pointer",fontWeight:600,fontSize:13,
            whiteSpace:"nowrap",transition:"all .2s"
          }}>{icon} {label}</button>
        ))}
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center"}}>
          <button onClick={openAdd} style={{background:"#10b981",border:"none",color:"#fff",padding:"7px 14px",borderRadius:10,fontWeight:700,cursor:"pointer",fontSize:13}}>
            + เพิ่ม
          </button>
        </div>
      </div>

      {/* FAB (mobile only) */}
      <button className="fab" onClick={openAdd}>＋</button>

      {/* Content */}
      <div className="main-content">

        {/* DASHBOARD */}
        {activeTab==="dashboard" && (
          <div>
            <div className="kpi-grid-3">
              <KpiCard icon="💹" label="รายรับทั้งปี"   value={fmt(dashStats.totalIncome)}  color={INCOME_COLOR} />
              <KpiCard icon="💸" label="รายจ่ายทั้งปี"  value={fmt(dashStats.totalExpense)} color={EXPENSE_COLOR} />
              <KpiCard icon="📈" label="ลงทุน/ออมทั้งปี" value={fmt(dashStats.totalInvest)}  color={INVEST_COLOR} />
              <KpiCard icon="🏦" label="เงินคงเหลือ"    value={fmt(dashStats.balance)}      color={dashStats.balance>=0?BALANCE_COLOR:"#f43f5e"} />
            </div>

            <div style={{...S.card,marginBottom:12}}>
              <div style={S.cardTitle}>รายรับ-รายจ่าย-ลงทุน รายเดือน {viewYear}</div>
              <ResponsiveContainer width="100%" height={200}>
                <BarChart data={monthSummary} margin={{top:4,right:4,bottom:0,left:-16}}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
                  <XAxis dataKey="month" stroke="#94a3b8" tick={{fill:"#94a3b8",fontSize:10}} />
                  <YAxis stroke="#94a3b8" tick={{fill:"#94a3b8",fontSize:9}} tickFormatter={v=>(v/1000)+"k"} />
                  <Tooltip formatter={v=>fmt(v)} contentStyle={{background:"#1e293b",border:"1px solid #334155",borderRadius:8,fontSize:12}} />
                  <Legend wrapperStyle={{color:"#94a3b8",fontSize:11}} />
                  <Bar dataKey="income"  name="รายรับ"    fill={INCOME_COLOR}  radius={[4,4,0,0]} />
                  <Bar dataKey="expense" name="รายจ่าย"   fill={EXPENSE_COLOR} radius={[4,4,0,0]} />
                  <Bar dataKey="invest"  name="ลงทุน/ออม" fill={INVEST_COLOR}  radius={[4,4,0,0]} />
                </BarChart>
              </ResponsiveContainer>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:4}}>
              <div style={S.card}>
                <div style={S.cardTitle}>สัดส่วนรายจ่าย</div>
                {dashStats.expPieData.length>0?(
                  <ResponsiveContainer width="100%" height={160}>
                    <PieChart>
                      <Pie data={dashStats.expPieData} cx="50%" cy="50%" outerRadius={58} dataKey="value" nameKey="name" labelLine={false} fontSize={9}>
                        {dashStats.expPieData.map((e,i)=><Cell key={i} fill={colorMap[e.name]||"#f43f5e"} />)}
                      </Pie>
                      <Tooltip formatter={v=>fmt(v)} contentStyle={{background:"#1e293b",border:"1px solid #334155",borderRadius:8,fontSize:11}} />
                      <Legend wrapperStyle={{color:"#94a3b8",fontSize:10}} />
                    </PieChart>
                  </ResponsiveContainer>
                ):<div style={{textAlign:"center",color:"#64748b",padding:24,fontSize:13}}>ยังไม่มีข้อมูล</div>}
              </div>
              <div style={S.card}>
                <div style={S.cardTitle}>สัดส่วนลงทุน/ออม</div>
                {dashStats.invPieData.length>0?(
                  <ResponsiveContainer width="100%" height={160}>
                    <PieChart>
                      <Pie data={dashStats.invPieData} cx="50%" cy="50%" outerRadius={58} dataKey="value" nameKey="name" labelLine={false} fontSize={9}>
                        {dashStats.invPieData.map((e,i)=><Cell key={i} fill={colorMap[e.name]||"#f59e0b"} />)}
                      </Pie>
                      <Tooltip formatter={v=>fmt(v)} contentStyle={{background:"#1e293b",border:"1px solid #334155",borderRadius:8,fontSize:11}} />
                      <Legend wrapperStyle={{color:"#94a3b8",fontSize:10}} />
                    </PieChart>
                  </ResponsiveContainer>
                ):<div style={{textAlign:"center",color:"#64748b",padding:24,fontSize:13}}>ยังไม่มีข้อมูล</div>}
              </div>
            </div>

            <div style={{...S.card,marginBottom:4}}>
              <div style={S.cardTitle}>ยอดเงินสะสม</div>
              <ResponsiveContainer width="100%" height={150}>
                <LineChart data={monthSummary.map((m,i)=>({...m,cum:monthSummary.slice(0,i+1).reduce((s,x)=>s+x.balance,0)}))}
                  margin={{top:4,right:4,bottom:0,left:-16}}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
                  <XAxis dataKey="month" stroke="#94a3b8" tick={{fill:"#94a3b8",fontSize:9}} />
                  <YAxis stroke="#94a3b8" tick={{fill:"#94a3b8",fontSize:9}} tickFormatter={v=>(v/1000)+"k"} />
                  <Tooltip formatter={v=>fmt(v)} contentStyle={{background:"#1e293b",border:"1px solid #334155",borderRadius:8,fontSize:11}} />
                  <Line type="monotone" dataKey="cum" name="คงเหลือสะสม" stroke={BALANCE_COLOR} strokeWidth={2.5} dot={false} />
                </LineChart>
              </ResponsiveContainer>
            </div>
          </div>
        )}

        {/* TRANSACTIONS */}
        {activeTab==="transactions" && (
          <div>
            <div style={{display:"flex",gap:8,marginBottom:12}}>
              <input placeholder="🔍 ค้นหา..." value={searchText} onChange={e=>setSearchText(e.target.value)}
                className="inp" style={{flex:1}} />
              <select value={filterType} onChange={e=>setFilterType(e.target.value)} className="inp" style={{width:"auto",paddingLeft:10,paddingRight:10}}>
                <option value="all">ทั้งหมด</option>
                <option value="income">💹 รายรับ</option>
                <option value="expense">💸 รายจ่าย</option>
                <option value="invest">📈 ลงทุน/ออม</option>
              </select>
            </div>
            <div style={{marginBottom:10}}>
              <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} className="inp">
                <option value="all">ทุกหมวดหมู่</option>
                {categories.map(c=><option key={c.id} value={c.name}>{c.name}</option>)}
              </select>
            </div>

            {/* Mobile cards */}
            <div className="tx-card-list">
              {filteredTx.length===0
                ?<div style={{textAlign:"center",color:"#64748b",padding:40,fontSize:14}}>ไม่พบรายการ</div>
                :filteredTx.map(t=><TxCard key={t.id} t={t} colorMap={colorMap} onEdit={openEdit} onDelete={setDeleteConfirm}/>)}
            </div>

            {/* Desktop table */}
            <div className="tx-table-wrap" style={{...S.card,padding:0,overflow:"hidden"}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead>
                  <tr style={{background:"#1e3a5f"}}>
                    {["วันที่","ประเภท","หมวดหมู่","รายละเอียด","จำนวน",""].map(h=>(
                      <th key={h} style={{padding:"10px 14px",textAlign:h==="จำนวน"?"right":"left",color:"#94a3b8",fontWeight:600,fontSize:12,borderBottom:"1px solid #334155"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {filteredTx.length===0&&<tr><td colSpan={6} style={{textAlign:"center",padding:28,color:"#64748b"}}>ไม่พบรายการ</td></tr>}
                  {filteredTx.map(t=>(
                    <tr key={t.id} style={{borderBottom:"1px solid #1e293b"}}
                      onMouseEnter={e=>e.currentTarget.style.background="#1e293b"}
                      onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                      <td style={{padding:"9px 14px",fontSize:12,color:"#94a3b8"}}>{formatDate(t.date)}</td>
                      <td style={{padding:"9px 14px"}}>
                        <span style={{background:t.type==="income"?"#064e3b":"#4c0519",color:t.type==="income"?"#34d399":"#fb7185",padding:"2px 9px",borderRadius:20,fontSize:11,fontWeight:600}}>
                          {t.type==="income"?"รายรับ":"รายจ่าย"}
                        </span>
                      </td>
                      <td style={{padding:"9px 14px",fontSize:12}}>
                        <span style={{display:"inline-flex",alignItems:"center",gap:5}}>
                          <span style={{width:7,height:7,borderRadius:"50%",background:colorMap[t.category]||"#64748b"}}/>
                          {t.category}
                        </span>
                      </td>
                      <td style={{padding:"9px 14px",fontSize:12,color:"#cbd5e1",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.desc||"—"}</td>
                      <td style={{padding:"9px 14px",textAlign:"right",fontWeight:700,fontSize:13,color:t.type==="income"?INCOME_COLOR:EXPENSE_COLOR}}>
                        {t.type==="expense"?"-":"+"}{fmt(t.amount)}
                      </td>
                      <td style={{padding:"9px 14px",textAlign:"right",whiteSpace:"nowrap"}}>
                        <button onClick={()=>openEdit(t)} style={iconBtn("#6366f1")}>✏️</button>
                        <button onClick={()=>setDeleteConfirm(t)} style={{...iconBtn("#f43f5e"),marginLeft:4}}>🗑️</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div style={{textAlign:"right",marginTop:8,color:"#64748b",fontSize:11}}>{filteredTx.length} รายการ</div>
          </div>
        )}

        {/* MONTHLY */}
        {activeTab==="monthly" && (
          <div>
            <div className="month-pills">
              {MONTHS.map((m,i)=>(
                <button key={i} onClick={()=>setViewMonth(i)} style={{
                  padding:"8px 14px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:700,fontSize:13,
                  background:viewMonth===i?"#6366f1":"#1e293b",color:viewMonth===i?"#fff":"#94a3b8",
                  position:"relative",flexShrink:0,transition:"all .2s",
                  boxShadow:viewMonth===i?"0 2px 10px rgba(99,102,241,.4)":"none"
                }}>
                  {m}
                  {monthSummary[i].income+monthSummary[i].expense>0&&(
                    <span style={{position:"absolute",top:2,right:2,width:6,height:6,borderRadius:"50%",background:viewMonth===i?"#fff":"#6366f1",border:"1.5px solid #0f172a"}}/>
                  )}
                </button>
              ))}
            </div>
            <div className="kpi-grid-3" style={{marginBottom:12}}>
              <KpiCard icon="💹" label="รายรับ"      value={fmt(monthSummary[viewMonth].income)}  color={INCOME_COLOR} />
              <KpiCard icon="💸" label="รายจ่าย"     value={fmt(monthSummary[viewMonth].expense)} color={EXPENSE_COLOR} />
              <KpiCard icon="📈" label="ลงทุน/ออม"  value={fmt(monthSummary[viewMonth].invest)}  color={INVEST_COLOR} />
              <KpiCard icon="🏦" label="คงเหลือ"     value={fmt(monthSummary[viewMonth].balance)} color={monthSummary[viewMonth].balance>=0?BALANCE_COLOR:"#f43f5e"} />
            </div>
            <div style={S.card}>
              <div style={S.cardTitle}>{MONTHS_FULL[viewMonth]} {viewYear}</div>
              {monthTx.length===0
                ?<div style={{textAlign:"center",color:"#64748b",padding:28,fontSize:13}}>ไม่มีรายการในเดือนนี้</div>
                :<div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {monthTx.map(t=><TxCard key={t.id} t={t} colorMap={colorMap} onEdit={openEdit} onDelete={setDeleteConfirm}/>)}
                </div>
              }
            </div>
          </div>
        )}

        {/* YEARLY */}
        {activeTab==="yearly" && (
          <div>
            <div style={{...S.card,marginBottom:16}}>
              <div style={S.cardTitle}>เปรียบเทียบทุกปี</div>
              <ResponsiveContainer width="100%" height={240}>
                <BarChart data={yearSummary} margin={{top:5,right:10,bottom:0,left:0}}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
                  <XAxis dataKey="year" stroke="#94a3b8" tick={{fill:"#94a3b8",fontSize:12}} />
                  <YAxis stroke="#94a3b8" tick={{fill:"#94a3b8",fontSize:10}} tickFormatter={v=>(v/1000)+"k"} />
                  <Tooltip formatter={v=>fmt(v)} contentStyle={{background:"#1e293b",border:"1px solid #334155",borderRadius:8}} />
                  <Legend wrapperStyle={{color:"#94a3b8",fontSize:12}} />
                  <Bar dataKey="income"  name="รายรับ"  fill={INCOME_COLOR}  radius={[4,4,0,0]} />
                  <Bar dataKey="expense" name="รายจ่าย" fill={EXPENSE_COLOR} radius={[4,4,0,0]} />
                  <Bar dataKey="balance" name="คงเหลือ" fill={BALANCE_COLOR} radius={[4,4,0,0]} />
                </BarChart>
              </ResponsiveContainer>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:14}}>
              {yearSummary.map(y=>(
                <div key={y.year} style={{...S.card,cursor:"pointer",borderLeft:`4px solid ${y.balance>=0?INCOME_COLOR:EXPENSE_COLOR}`}}
                  onClick={()=>{setViewYear(y.year);setActiveTab("monthly");}}>
                  <div style={{fontSize:18,fontWeight:700,marginBottom:10,color:"#f1f5f9"}}>{y.year}</div>
                  <div style={{display:"flex",flexDirection:"column",gap:7}}>
                    {[["💹 รายรับ",fmt(y.income),INCOME_COLOR],["💸 รายจ่าย",fmt(y.expense),EXPENSE_COLOR]].map(([l,v,c])=>(
                      <div key={l} style={{display:"flex",justifyContent:"space-between"}}>
                        <span style={{color:"#94a3b8",fontSize:12}}>{l}</span>
                        <span style={{color:c,fontWeight:700,fontSize:13}}>{v}</span>
                      </div>
                    ))}
                    <div style={{height:1,background:"#334155",margin:"2px 0"}} />
                    <div style={{display:"flex",justifyContent:"space-between"}}>
                      <span style={{color:"#94a3b8",fontSize:12}}>🏦 คงเหลือ</span>
                      <span style={{color:y.balance>=0?INCOME_COLOR:EXPENSE_COLOR,fontWeight:700,fontSize:15}}>{fmt(y.balance)}</span>
                    </div>
                    {y.income>0&&(
                      <div style={{marginTop:4}}>
                        <div style={{fontSize:10,color:"#64748b",marginBottom:3}}>อัตราออม {((y.balance/y.income)*100).toFixed(1)}%</div>
                        <div style={{background:"#334155",borderRadius:4,height:5}}>
                          <div style={{width:`${Math.max(0,Math.min(100,(y.balance/y.income)*100))}%`,background:y.balance>=0?INCOME_COLOR:EXPENSE_COLOR,height:"100%",borderRadius:4}} />
                        </div>
                      </div>
                    )}
                  </div>
                  <div style={{marginTop:10,fontSize:11,color:"#64748b"}}>คลิกเพื่อดูรายเดือน →</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* CATEGORIES */}
        {activeTab==="categories" && (
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,gap:8}}>
              <div style={{display:"flex",gap:5}}>
                {[["all","ทั้งหมด"],["income","💹"],["expense","💸"],["invest","📈"]].map(([v,lbl])=>(
                  <button key={v} onClick={()=>setCatFilter(v)} style={{
                    padding:"8px 13px",borderRadius:10,border:"none",cursor:"pointer",fontWeight:700,fontSize:13,
                    background:catFilter===v?"#6366f1":"#1e293b",color:catFilter===v?"#fff":"#94a3b8"
                  }}>{lbl}</button>
                ))}
              </div>
              <button onClick={openAddCat} style={{background:"#6366f1",border:"none",color:"#fff",padding:"9px 16px",borderRadius:12,fontWeight:700,cursor:"pointer",fontSize:14}}>
                + เพิ่ม
              </button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:10}}>
              {filteredCats.map(cat=>{
                const use=transactions.filter(t=>t.category===cat.name).length;
                return (
                  <div key={cat.id} style={{...S.card,borderLeft:`4px solid ${cat.color}`,padding:"12px 14px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                      <div style={{width:28,height:28,borderRadius:"50%",background:cat.color,flexShrink:0}} />
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:700,fontSize:13,color:"#f1f5f9",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{cat.name}</div>
                        <div style={{fontSize:10,color:cat.type==="income"?INCOME_COLOR:cat.type==="invest"?INVEST_COLOR:EXPENSE_COLOR}}>
                          {cat.type==="income"?"💹 รายรับ":cat.type==="invest"?"📈 ลงทุน/ออม":"💸 รายจ่าย"}
                        </div>
                      </div>
                    </div>
                    <div style={{fontSize:11,color:"#64748b",marginBottom:8}}>{use} รายการ</div>
                    <div style={{display:"flex",gap:5}}>
                      <button onClick={()=>openEditCat(cat)} style={{flex:1,padding:"7px 0",borderRadius:8,border:"1px solid #6366f155",background:"#6366f111",color:"#a5b4fc",cursor:"pointer",fontWeight:600,fontSize:12}}>✏️</button>
                      <button onClick={()=>setDeleteCatConfirm({cat,usageCount:use})} style={{flex:1,padding:"7px 0",borderRadius:8,border:"1px solid #f43f5e55",background:"#f43f5e11",color:"#fda4af",cursor:"pointer",fontWeight:600,fontSize:12}}>🗑️</button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {/* MODAL เพิ่ม/แก้ไขรายการ */}
      {showModal&&(
        <ModalSheet onClose={()=>setShowModal(false)}>
          <div style={{fontSize:16,fontWeight:700,marginBottom:16,color:"#f1f5f9"}}>{editItem?"✏️ แก้ไขรายการ":"➕ เพิ่มรายการใหม่"}</div>

          <label style={S.label}>ประเภท</label>
          <div style={{display:"flex",gap:6,marginBottom:14}}>
            <button onClick={()=>handleTypeChange("income")}  style={S.typeBtn(form.type==="income", INCOME_COLOR,"#064e3b")}>💹 รายรับ</button>
            <button onClick={()=>handleTypeChange("expense")} style={S.typeBtn(form.type==="expense",EXPENSE_COLOR,"#4c0519")}>💸 รายจ่าย</button>
            <button onClick={()=>handleTypeChange("invest")}  style={S.typeBtn(form.type==="invest", INVEST_COLOR, "#451a03")}>📈 ลงทุน</button>
          </div>

          <label style={S.label}>วันที่</label>
          <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} className="inp" style={{marginBottom:12}} />

          <label style={S.label}>หมวดหมู่</label>
          <select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))} className="inp" style={{marginBottom:12}}>
            {formCats.map(c=><option key={c.id} value={c.name}>{c.name}</option>)}
          </select>

          <label style={S.label}>รายละเอียด</label>
          <input placeholder="บันทึกรายละเอียด..." value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))} className="inp" style={{marginBottom:12}} />

          <label style={S.label}>จำนวนเงิน (บาท)</label>
          <input type="number" placeholder="0" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} className="inp" style={{marginBottom:4}} inputMode="numeric" min="0" />

          <div className="btn-row">
            <button onClick={()=>setShowModal(false)} className="btn-cancel">ยกเลิก</button>
            <button onClick={saveForm} className="btn-primary">{editItem?"บันทึก":"เพิ่มรายการ"}</button>
          </div>
        </ModalSheet>
      )}

      {/* MODAL หมวดหมู่ */}
      {showCatModal&&(
        <ModalSheet onClose={()=>setShowCatModal(false)}>
          <div style={{fontSize:16,fontWeight:700,marginBottom:16,color:"#f1f5f9"}}>{editCat?"✏️ แก้ไขหมวดหมู่":"🏷️ เพิ่มหมวดหมู่"}</div>

          <label style={S.label}>ประเภท</label>
          <div style={{display:"flex",gap:6,marginBottom:14}}>
            <button onClick={()=>setCatForm(f=>({...f,type:"income"}))}  style={S.typeBtn(catForm.type==="income", INCOME_COLOR,"#064e3b")}>💹 รายรับ</button>
            <button onClick={()=>setCatForm(f=>({...f,type:"expense"}))} style={S.typeBtn(catForm.type==="expense",EXPENSE_COLOR,"#4c0519")}>💸 รายจ่าย</button>
            <button onClick={()=>setCatForm(f=>({...f,type:"invest"}))}  style={S.typeBtn(catForm.type==="invest", INVEST_COLOR, "#451a03")}>📈 ลงทุน</button>
          </div>

          <label style={S.label}>ชื่อหมวดหมู่</label>
          <input placeholder="เช่น ค่าอาหาร, เงินเดือน..." value={catForm.name} onChange={e=>setCatForm(f=>({...f,name:e.target.value}))} className="inp" style={{marginBottom:12}} />

          <label style={S.label}>สี</label>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
            {COLOR_PALETTE.map(color=>(
              <button key={color} onClick={()=>setCatForm(f=>({...f,color}))} style={{
                width:30,height:30,borderRadius:"50%",background:color,border:"none",cursor:"pointer",
                outline:catForm.color===color?"3px solid #fff":"2px solid transparent",outlineOffset:2,
                transform:catForm.color===color?"scale(1.15)":"scale(1)",transition:"all .15s"
              }} />
            ))}
          </div>

          {catForm.name.trim()&&(
            <div style={{display:"flex",alignItems:"center",gap:8,background:"#0f172a",padding:"10px 14px",borderRadius:10,marginBottom:12}}>
              <div style={{width:24,height:24,borderRadius:"50%",background:catForm.color}} />
              <span style={{fontWeight:700,color:"#f1f5f9"}}>{catForm.name}</span>
              <span style={{fontSize:11,color:catForm.type==="income"?INCOME_COLOR:"#fb923c",marginLeft:"auto"}}>
                {catForm.type==="income"?"รายรับ":"รายจ่าย"}
              </span>
            </div>
          )}
          {!editCat&&catForm.name.trim()&&categories.some(c=>c.name===catForm.name.trim())&&(
            <div style={{color:"#f43f5e",fontSize:12,marginBottom:10}}>⚠️ ชื่อนี้มีอยู่แล้ว</div>
          )}
          <div className="btn-row">
            <button onClick={()=>setShowCatModal(false)} className="btn-cancel">ยกเลิก</button>
            <button onClick={saveCat} className="btn-primary">{editCat?"บันทึก":"เพิ่มหมวดหมู่"}</button>
          </div>
        </ModalSheet>
      )}

      {/* MODAL ยืนยันลบรายการ */}
      {deleteConfirm&&(
        <ModalSheet onClose={()=>setDeleteConfirm(null)} center={true}>
          <div style={{fontSize:16,fontWeight:700,marginBottom:10,color:"#f43f5e"}}>🗑️ ยืนยันการลบ</div>
          <div style={{color:"#94a3b8",marginBottom:18,fontSize:14,lineHeight:1.6}}>
            ลบ <strong style={{color:"#f1f5f9"}}>{deleteConfirm.desc||deleteConfirm.category}</strong><br/>
            <strong style={{color:EXPENSE_COLOR}}>{fmt(deleteConfirm.amount)}</strong> ?
          </div>
          <div className="btn-row" style={{marginTop:0}}>
            <button onClick={()=>setDeleteConfirm(null)} className="btn-cancel">ยกเลิก</button>
            <button onClick={()=>deleteItem(deleteConfirm.id)} className="btn-danger">ลบเลย</button>
          </div>
        </ModalSheet>
      )}

      {/* MODAL ยืนยันลบหมวดหมู่ */}
      {deleteCatConfirm&&(
        <ModalSheet onClose={()=>setDeleteCatConfirm(null)} center={true}>
          <div style={{fontSize:16,fontWeight:700,marginBottom:12,color:"#f43f5e"}}>🗑️ ลบหมวดหมู่</div>
          <div style={{display:"flex",alignItems:"center",gap:8,background:"#0f172a",padding:"10px 14px",borderRadius:10,marginBottom:12}}>
            <div style={{width:24,height:24,borderRadius:"50%",background:deleteCatConfirm.cat.color}} />
            <span style={{fontWeight:700,color:"#f1f5f9"}}>{deleteCatConfirm.cat.name}</span>
          </div>
          {deleteCatConfirm.usageCount>0&&(
            <div style={{background:"#4c0519",border:"1px solid #f43f5e55",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:13,color:"#fda4af"}}>
              ⚠️ ใช้ใน <strong>{deleteCatConfirm.usageCount} รายการ</strong>
            </div>
          )}
          <div className="btn-row" style={{marginTop:0}}>
            <button onClick={()=>setDeleteCatConfirm(null)} className="btn-cancel">ยกเลิก</button>
            <button onClick={deleteCat} className="btn-danger">ลบหมวดหมู่</button>
          </div>
        </ModalSheet>
      )}

      {/* Bottom Navigation Bar (mobile only) */}
      <nav className="bottom-nav">
        {tabs.map(({k,icon,label})=>(
          <button key={k} className={"bnav-btn"+(activeTab===k?" active":"")} onClick={()=>setActiveTab(k)}
            style={activeTab===k?{"--active-color":prof.color}:{}}>
            <span className="bnav-icon">{icon}</span>
            <span className="bnav-label" style={activeTab===k?{color:prof.color}:{}}>{label}</span>
            <span className="bnav-dot" style={{background:prof.color}}/>
          </button>
        ))}
      </nav>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
